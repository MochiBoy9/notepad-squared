<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset ="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notepad^2</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            height: 100vh;
            background-color: #f4f4f5;
            color: #333;
        }
        #sidebar {
            width: 280px;
            background-color: #ffffff;
            border-right: 1px solid #e4e4e7;
            display: flex;
            flex-direction: column;
        }
        #sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #e4e4e7;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        #sidebar-header h2 {
            font-size: 1.2rem;
        }
        #new-note-btn {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
        }
        #new-note-btn:hover {
            background-color: #0056b3;
        }
        #note-list {
            flex: 1;
            overflow-y: auto;
            list-style: none;
        }
        .note-item {
            padding: 15px 20px;
            border-bottom: 1px solid #e4e4e7;
            cursor: pointer;
            transition: background-color 0.1s;
            position: relative;
        }
        .note-item:hover {
            background-color: #f8f9fa;
        }
        .note-item.active {
            background-color: #e6f2ff;
            border-left: 4px solid #007bff;
        }
        .note-title {
            font-weight: bold;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .note-snippet {
            font-size: 0.85rem;
            color: #666;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .delete-btn {
            color: #dc3545;
            font-size: 0.8rem;
            border: none;
            background: none;
            cursor: pointer;
            margin-top: 8px;
            display: none;
        }
        .note-item:hover .delete-btn {
            display: inline-block;
        }
        .note-item.active .delete-btn {
            display: inline-block;
        }
        #editor-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }
        #editor {
        flex: 1;
        width: 100%;
        border: 1px solid #e4e4e7;
        border-bottom-left-radius: 8px;
        border-bottom-right-radius: 8px;
        padding: 30px;
        font-size: 1.1rem;
        line-height: 1.6;
        outline: none;
        box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        overflow-y: auto;
        background-color: #ffffff;
        background-image: radial-gradient(#d1d1d6 1.5px, transparent 1.5px);
        background-size: 26px 26px;
        }
        #note-title-input {
            width: 100%;
            font-size: 1.8rem;
            font-weight: bold;
            border: none;
            background: transparent;
            outline: none;
            margin-bottom: 15px;
            padding: 5px 0;
        }
        #toolbar {
            display: flex;
            gap: 5px;
            background: #ffffff;
            padding: 8px;
            border: 1px solid #e4e4e7;
            border-bottom: none;
            border-top-left-radius: 8px;
            border-top-right-radius: 8px;
        }
        .tool-btn {
            background: #fff;
            border: 1px solid #e4e4e7;
            padding: 6px 12px;
            font-size: 0.9rem;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
        }
        .tool-btn:hover {
            background: #f4f4f5;
        }
        .empty-state {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #888;
            flex-direction: column;
        }
    </style>
    </head>
<body>
    <div id="sidebar">
        <div id="sidebar-header">
            <h2>your notes</h2>
            <button id="new-note-btn">+ new</button>
        </div>
        <ul id="note-list"></ul>
    </div>
    <div id="editor-container">
        <div id="empty-state" class="empty-state">
            <h2>no note found</h2>
            <p>you can find notes on ur sidebar, and you can also make new ones.</p>
        </div>
        <div id="editor-wrapper" style="display: none; flex: 1; flex-direction: column;">
            <input type="text" id="note-title-input" placeholder="start typing here...">
            <div id="toolbar">
                <button class="tool-btn" data-cmd="bold" style="font-weight: bold;">B</button>
                <button class="tool-btn" data-cmd="italic" style="font-weight: italic;">I</button>
                <button class="tool-btn" data-cmd="underline" style="text-decoration: underline;">U</button>
                <button class="tool-btn" data-cmd="strikeThrough" style="text-decoration: line-through;">S</button>
            </div>
            <div id="editor" contenteditable="true"></div>
        </div>
    </div>

    <script>
        const noteListEl = document.getElementById('note-list');
        const editorEl = document.getElementById('editor')
        const titleInputEl = document.getElementById('note-title-input');
        const emptyStateEl = document.getElementById('empty-state');
        const editorWrapperEl = document.getElementById('editor-wrapper');
        const newNoteBtn = document.getElementById('new-note-btn');
        const toolbarButtons = document.querySelectorAll('.tool-btn');
        let notes = JSON.parse(localStorage.getItem('browser-notes')) || [];
        let activeNoteId = null;
        
        function saveNotes() {
            localStorage.setItem('browser-notes', JSON.stringify(notes));
            renderList()
        }
        function renderList() {
            noteListEl.innerHTML = '';
            notes.forEach(note => {
                const li = document.createElement('li');
                li.className = `note-item ${note.id === activeNoteId ? 'active' : ''}`;
                li.onclick = () => selectNote(note.id);
                const title = document.createElement('div');
                title.className = 'note-title';
                title.textContent = note-title && note.title.trim() ? note.title : 'untitled note';
                const delBtn = document.createElement('button');
                delBtn.className = 'delete-btn';
                delBtn.textContent = 'delete';
                delBtn.onclick = (e) => {
                    e.stopPropagation();
                    deleteNote(note.id);
                };
                li.appendChild(title);
                li.appendChild(delBtn);
                noteListEl.appendChild(li);
            });
        }
        function createNote() {
            const newNote = { id: Date.now(), title: '', content:''};
            notes.unshift(newNote);
            selectNote(newNote.id);
            saveNotes();
        }
        function selectNote(id) {
            activeNoteId = id;
            const note = notes.find(n => n.id === id);
            if (note) {
                emptyStateEl.style.display = 'none';
                editorWrapperEl.style.display = 'flex';
                titleInputEl.value = note.title;
                editorEl.innerHTML = note.content;
            }
            renderList();
        }
        function deleteNote(id) {
            notes = notes.filter(n => n.id !== id);
            if (activeNoteId === id) {
                activeNoteId = null;
                emptyStateEl.style.display = 'flex';
                editorWrapperEl.style.display = 'none';
                titleInputEl.value = '';
                editorEl.innerHTML = '';
            }
            saveNotes();
        }
        editorEl.addEventListener('input', () => {
            if (!activeNoteId) return;
            const note = notes.find(n => n.id === activeNoteId);
            if (note) {
                note.content = editorEl.innerHTML;
                localStorage.setItem('browser-notes', JSON.stringify(notes));
            }
        });
        titleInputEl.addEventListener('input', (e) => {
            if (!activeNoteId) return;
            const note = notes.find(n => n.id === activeNoteId);
            if (note) {
                note.title = e.target.value;
                saveNotes();
            }
        });
        toolbarButtons.forEach(button => {
            button.addEventListener('mousedown', (e) => {
                e.preventDefault();
                const command = button.getAttribute('data-cmd');
                document.execCommand(command, false, null);
                editorEl.dispatchEvent(new Event('input'));
            });
        });
        newNoteBtn.addEventListener('click', createNote);
        renderList();
        if (notes.length > 0) {
            selectNote(notes[0].id);
        }

    </script>
</body>
</html>
